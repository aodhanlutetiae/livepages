name: BBC Live Scraper

on:
  schedule:
    - cron: "*/5 * * * *"  # every minute
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests beautifulsoup4

      - run: python livepage_scrape.py

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"

          git add datafiles/bbc_live_data.csv

          git commit -m "update csv" || exit 0
          git push
